name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-lib:
    name: Test library (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: airspy,rtlsdr
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                libairspyhf-dev \
                librtlsdr-dev \
                libsoapysdr-dev \
                libasound2-dev \
                libxkbcommon-dev \
                libwayland-dev \
                libxcb-render0-dev \
                libxcb-shape0-dev \
                libxcb-xfixes0-dev
          - os: macos-latest
            features: airspy
            install: scripts/install-macos-sdr-deps.sh --no-rtlsdr
          - os: windows-latest
            features: airspy,rtlsdr
            install: pwsh -File scripts/install-windows-sdr-deps.ps1
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install native dependencies
        run: ${{ matrix.install }}
        shell: bash

      - name: cargo test
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cargo test --features gui
          elif [ -n "${{ matrix.features }}" ]; then
            cargo test --features "${{ matrix.features }}"
          else
            cargo test --no-default-features
          fi
        shell: bash

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libairspyhf-dev \
            librtlsdr-dev \
            libsoapysdr-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --features gui --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: mashu/hfsdr
          files: lcov.info
          fail_ci_if_error: false

  build-gui:
    name: Build hfsdr GUI (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            features: gui
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                libairspyhf-dev \
                librtlsdr-dev \
                libsoapysdr-dev \
                libasound2-dev \
                libxkbcommon-dev \
                libwayland-dev \
                libxcb-render0-dev \
                libxcb-shape0-dev \
                libxcb-xfixes0-dev
          - os: macos-latest
            label: macos-universal
            features: gui
            install: scripts/install-macos-sdr-deps.sh
          - os: windows-latest
            label: windows-x86_64
            features: gui
            install: pwsh -File scripts/install-windows-sdr-deps.ps1
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install native dependencies
        run: ${{ matrix.install }}
        shell: bash

      - name: cargo build --release
        run: cargo build --release --features "${{ matrix.features }}"
        shell: bash

      - name: Smoke-check binary exists
        run: |
          case "${{ matrix.label }}" in
            windows-*)
              test -f target/release/hfsdr.exe
              ;;
            *)
              test -f target/release/hfsdr
              ;;
          esac
        shell: bash

  linux-no-sdr-libs:
    name: Linux without SDR libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install GUI dependencies only
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build without libairspyhf / librtlsdr / libSoapySDR installed
        run: cargo build --release --features gui

      - name: Verify no hard-linked SDR libraries
        run: bash scripts/smoke-no-sdr-libs.sh target/release/hfsdr

      - name: Runtime probe tests
        run: 'cargo test --features gui native_sdr:: --lib'

      - name: Source UI tests without native drivers
        run: 'cargo test --features gui --bin hfsdr source::kinds::'

  linux-appimage:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libairspyhf-dev \
            librtlsdr-dev \
            libsoapysdr-dev \
            soapysdr-module-all \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            curl \
            file \
            fuse3

      - name: Build release binary
        run: cargo build --release --features gui

      - name: Build AppImage
        run: bash scripts/build-appimage.sh
        env:
          CI: "true"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v6
        with:
          name: hfsdr-appimage
          path: hfsdr-*-x86_64.AppImage

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.4.40

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libairspyhf-dev \
            librtlsdr-dev \
            libsoapysdr-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build documentation
        run: ./scripts/build-docs.sh

      - name: Upload book artifact
        uses: actions/upload-artifact@v6
        with:
          name: hfsdr-book
          path: docs/book/

      - name: Upload API docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: hfsdr-api-docs
          path: target/doc/
