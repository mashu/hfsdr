[package]
name = "hfsdr"
version = "0.1.0"
edition = "2021"
description = "HF SDR client core: source-agnostic IQ pipeline (Airspy HF+, KiwiSDR)"

[dependencies]
num-complex = "0.4"
rtrb = "0.3"
rustfft = "6"
tungstenite = "0.29"
cpal = { version = "0.15", optional = true }
eframe = { version = "0.34", optional = true, default-features = false, features = ["wgpu", "default_fonts", "wayland", "x11"] }

[features]
gui = ["dep:eframe", "dep:cpal"]

[[bin]]
name = "hfsdr"
path = "src/main.rs"

[[bin]]
name = "waterfall"
path = "src/bin/waterfall/main.rs"
required-features = ["gui"]

[profile.release]
opt-level = 3
lto = "thin"
